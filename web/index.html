<!DOCTYPE html>
<html>
<head>
  <!--

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="p_secretary_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>p_secretary_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- キャラクター透過動画（Flutterの上にオーバーレイ） -->
  <!-- src は下のスクリプトで Safari=mp4 / その他=webm に振り分ける -->
  <video id="character-video" autoplay loop muted playsinline
    style="position:fixed; bottom:0; right:-12px; width:26vh; height:30vh; z-index:999; pointer-events:none; object-fit:contain; display:none;">
  </video>
  <script>
    // Safari は VP9 alpha webm を再生できない（黒背景になる）ため
    // HEVC alpha mp4 を選ぶ。それ以外（Chrome/Edge/Firefox）は webm。
    window.__pickCharVideoExt = function() {
      var ua = navigator.userAgent;
      var isSafari = /^((?!chrome|android).)*safari/i.test(ua);
      return isSafari ? 'mp4' : 'webm';
    };
    // mp4 は web/assets/mp4/ サブフォルダ、webm は web/assets/ 直下
    window.__charVideoSrc = function(baseName) {
      var ext = window.__pickCharVideoExt();
      return ext === 'mp4'
        ? 'assets/mp4/' + baseName + '.mp4'
        : 'assets/' + baseName + '.webm';
    };
    (function() {
      var v = document.getElementById('character-video');
      // 動画ロード中の「小→大」や位置ズレを目隠しするため、
      // loadeddata まで opacity:0、完了後にフェードイン。
      // src 変更を MutationObserver で検知して自動的に再度隠す。
      v.addEventListener('canplaythrough', function() {
        v.style.display = 'block';
        v.play().catch(function(){});
      });
      var resume = function() {
        if (v.paused) {
          v.currentTime = v.currentTime;
          v.play().catch(function(){});
        }
      };
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) resume();
      });
      window.addEventListener('pageshow', resume);
      window.addEventListener('focus', resume);
      new MutationObserver(function(ms) {
        for (var i = 0; i < ms.length; i++) {
          if (ms[i].attributeName === 'src') {
            v.style.display = 'none';
            break;
          }
        }
      }).observe(v, { attributes: true });
      v.src = window.__charVideoSrc('bw_idle');
      v.load();
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
